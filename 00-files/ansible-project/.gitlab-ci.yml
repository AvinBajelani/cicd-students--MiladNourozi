stages:
  - deploy-dev
  - deploy-prod


deploy-dev:
  stage: deploy-dev
  image: 9350733512/ansible:v1.0.0
  variables:
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_FORCE_COLOR: "True"
  before_script:
    - ls -la
    - mkdir -p ~/.ssh
    - echo "$DEPLOYER_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
    - ls -la ~/.ssh
    - pwd
  script:
    - cd ansible && ansible-playbook -i inventory/servers-dev.ini deploy.yml --become --become-method=sudo -t dev
  only:
    - dev


deploy-prod:
  stage: deploy-prod
  image: 9350733512/ansible:v1.0.0
  variables:
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_FORCE_COLOR: "True"
  before_script:
    - ls -la
    - mkdir -p ~/.ssh
    - echo "$DEPLOYER_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
    - ls -la ~/.ssh
    - pwd
  script:
    - cd ansible && ansible-playbook -i inventory/servers-prod.ini deploy.yml --become --become-method=sudo -t prod
  only:
    - main