apiVersion: v1
kind: ConfigMap
metadata:
  name: system-monitor-config
  namespace: monitoring
  labels:
    app: system-monitor
data:
  # How often to refresh the display (seconds)
  REFRESH_RATE: "1.0"

  # Bar width for CPU/memory graphs
  BAR_WIDTH: "30"

  # Whether to show loopback (lo) interface in network panel
  SHOW_LOOPBACK: "false"

  # Terminal type – required for rich color output inside a TTY-less pod
  TERM: "xterm-256color"
