stages:
  - test
  - build
  - deploy

run_unit_tests:
  stage: test
  before_script:
    - sh prepare-tests.sh
    - echo "Setting up unit test environment"
    - export UNIT_TEST_ENV=unit_testing
    - echo $UNIT_TEST_ENV
  script:
    - echo "Running unit tests"
    - sleep 5
    - echo "Unit tests completed successfully"
  after_script:
    - echo "Cleaning up unit test environment"
    - unset UNIT_TEST_ENV
    - echo "Unit test environment cleanup completed"

run_lint_tests:
  stage: test
  script:
    - echo "Running lint tests for project 1"
    - sleep 5
    - echo "Lint tests completed successfully"


build_app:
  stage: build
  script:
    # - wrong-command "to simulate a failure in the build stage" # this command will fail
    - echo "Building the application"
    - sleep 10
    - echo "Build completed successfully"
  

push_app:
  stage: build
  needs:
    - build_app
  script:
    - echo "Pushing the application to registry"
    - sleep 5
    - echo "Push completed successfully"

verify_app:
  stage: build
  needs:
    - build_app
  script:
    - echo "Verifying the application build"
    - sleep 5
    - echo "Verification completed successfully"

check_app:
  stage: build
  script:
    - echo "Checking the application build"
    - sleep 5
    - echo "Check completed successfully"

test_app:
  stage: build
  script:
    - echo "Testing the application build"
    - sleep 5
    - echo "Test completed successfully"

deploy_app:
  stage: deploy
  script:
    - echo "Deploying the application"
    - sleep 10
    - echo "Deployment completed successfully"
    - echo "Application is now LIVEEEEEEE"