variables:
  IMAGE_NAME: monitoring-app

stages:
  - build-dev
  - deploy-dev
  - build-prod
  - deploy-prod

build-dev:
  stage: build-dev
  script:
    - docker login -u "$DOCKER_HUB_USERNAME" -p "$DOCKER_HUB_PASSWORD"
    - docker build -t "9350733512/$IMAGE_NAME:$CI_PIPELINE_ID" .
    - docker push "9350733512/$IMAGE_NAME:$CI_PIPELINE_ID"
  only:
    - dev


deploy-dev:
  stage: deploy-dev
  image: dtzar/helm-kubectl:4.1
  script:
    - mkdir -p ~/.kube
    - chmod 700 ~/.kube
    - echo "$KUBE_CONFIG"
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - cat ~/.kube/config
    - sed -i "s/latest/$CI_PIPELINE_ID/g" deployment/dev/deploy-dev.yml
    - kubectl -n monitoring-app-dev apply -f deployment/dev/deploy-dev.yml
  only:
    - dev

############################### PROD
build-prod:
  stage: build-prod
  script:
    - docker login -u "$DOCKER_HUB_USERNAME" -p "$DOCKER_HUB_PASSWORD"
    - docker build -t "9350733512/$IMAGE_NAME:$CI_COMMIT_TAG" .
    - docker push "9350733512/$IMAGE_NAME:$CI_COMMIT_TAG"
  only:
    - tags

deploy-prod:
  stage: deploy-prod
  image: dtzar/helm-kubectl:4.1
  script:
    - mkdir -p ~/.kube
    - chmod 700 ~/.kube
    # - echo "$KUBE_CONFIG"
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    # - cat ~/.kube/config
    - sed -i "s/latest/$CI_COMMIT_TAG/g" deployment/prod/deploy-prod.yml
    - cat deployment/prod/deploy-prod.yml
    - kubectl -n monitoring-app-prod apply -f deployment/prod/deploy-prod.yml
  only:
    - tags
  when: manual