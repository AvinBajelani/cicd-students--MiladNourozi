---
# Build the image first:
#   docker build -t <your-registry>/system-monitor:latest .
#   docker push <your-registry>/system-monitor:latest
#
# Then update the image field below and apply:
#   kubectl apply -f daemonset.yaml
#
# View logs per node:
#   kubectl get pods -o wide                          # find which pod is on which node
#   kubectl logs -f <pod-name>                        # follow a specific node's metrics

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: system-monitor
  namespace: default
  labels:
    app: system-monitor
spec:
  selector:
    matchLabels:
      app: system-monitor
  template:
    metadata:
      labels:
        app: system-monitor
    spec:
      # hostPID:     true process count reflects the NODE (not just the container)
      # hostNetwork: true network interfaces reflect the NODE's NICs
      hostPID: true
      hostNetwork: true

      tolerations:
        # Run on control-plane nodes too (remove if you only want workers)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      containers:
        - name: monitor
          image: 9350733512/system-monitor:v1
          imagePullPolicy: Always

          # TERM lets the script use colours; the script itself loops forever
          env:
            - name: TERM
              value: xterm-256color
            # Expose the node name so you can tell which host the log came from
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

          securityContext:
            # Required for hostPID / reading full /proc on some hardened setups
            privileged: false
            readOnlyRootFilesystem: false
